name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained exe
        run: |
          dotnet publish src/optiRAM/optiRAM.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=embedded `
            -o portable/

      - name: Build installer
        run: |
          choco install innosetup --yes --no-progress
          iscc installer/optiRAM.iss

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            portable/optiRAM.exe
            installer/output/optiRAM-Setup-*.exe
          body: |
            ## optiRAM ${{ steps.version.outputs.version }}

            **Downloads:**
            - `optiRAM-Setup-*.exe` — Installer (recommended)
            - `optiRAM.exe` — Portable single-file executable

            Requires Windows 10 or later. .NET runtime is bundled.
            Run as administrator for full optimization features.
